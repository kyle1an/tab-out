<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Transparent favicon — placed immediately after charset so the
       HTML parser hits it as early as possible, minimizing the window
       where Chrome's default extension icon briefly flashes on load.
       Two forms (`icon` + `shortcut icon`) cover Chrome's fallback
       chain in both modern and legacy paths. -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg'/%3E" />
    <link rel="shortcut icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg'/%3E" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>‎</title>

    <!-- Typography: everything uses the user's Chrome "Sans-serif" setting
       (chrome://settings/fonts). No web fonts are loaded. -->

    <!-- base.css must load first: defines CSS variables and layout skeleton
       that every rule in style.css relies on. Parallel-downloaded thanks
       to two separate <link>s (no @import serial round-trip). -->
    <link rel="stylesheet" href="base.css" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- ================================================================
     PINNED TOP REGION — never scrolls, never rubber-bands
     Lives outside the scroll container so overscroll bounce only
     affects the card list below.
     ================================================================ -->
    <div class="pinned-top">
      <div class="page-inner">
        <header>
          <!-- Single row: stats at the left, filter at the right. DOM order
           matches visual order (no row-reverse trick). Stats collapse from
           the old stacked h1 + sub-line + action row (~109px) into one
           ~32px line, reclaiming vertical space for the card grid. -->
          <div class="header-row">
            <div class="header-stats">
              <!-- Dedup button — leftmost anchor. Lives alone at the start
               of the stats row; nothing can slide into its position when
               it hides. A cursor aimed at dedup either clicks dedup or
               lands on a passive stat span, never on another action. -->
              <span id="openTabsDedupAction"></span>
              <!-- "182 Open tabs · Across 3 windows · 17 domains" +
                   the Dedupe-N + Close-N-filtered-tabs buttons are
                   all rendered by <HeaderStats> (components/HeaderStats.js)
                   into this .header-stats node. The inner spans below
                   are placeholder markup that Preact replaces on the
                   first renderHeaderStats() call; the IDs are kept
                   purely for inspector familiarity. -->
              <span class="stat-primary" id="greeting"></span>
              <span class="stat-sep">·</span>
              <span class="date" id="dateDisplay"></span>
              <!-- Domain count. Hidden with the rest of sectionHeaderWrap
               when there are no cards; render.js toggles display. -->
              <span class="stat-extras" id="sectionHeaderWrap" style="display: none">
                <span class="stat-sep">·</span>
                <span class="section-count" id="openTabsSectionCount"></span>
              </span>
              <!-- Close-filtered button — anchored at the END of the stats
               row, separated from dedup by the (never-clickable) stat
               spans between them. Two independent slots, so neither
               action button can slide into the other's position when
               state changes. Only appears while a filter is active. -->
              <span class="section-actions" id="openTabsSectionActions"></span>
            </div>
            <!-- Live filter — debounced; matches title text + URL substring;
             hides non-matching chips and any card left empty. Wrapped so
             the custom ✕ clear button can sit inside the input's right
             edge; visibility toggled via `.has-value` on the wrapper. -->
            <div class="tab-filter-wrap" id="tabFilterWrap">
              <input type="search" id="tabFilter" class="tab-filter" autocomplete="off" spellcheck="false" placeholder="Type anywhere to filter…" />
              <button class="tab-filter-clear" id="tabFilterClear" type="button" title="Clear filter" aria-label="Clear filter">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12" />
                </svg>
              </button>
            </div>
          </div>
        </header>
      </div>
    </div>

    <!-- ================================================================
     SCROLL REGION — the only place that scrolls + rubber-bands
     ================================================================ -->
    <div class="scroll-region">
      <div class="page-inner">
        <div class="active-section" id="openTabsSection" style="display: none">
          <!-- Primary missions grid: cards that have at least one tab
               matching the filter. When the filter is empty, this holds
               every card. -->
          <div class="missions" id="openTabsMissions"></div>
          <!-- "Other tabs" section: same cards rendered AGAIN with their
               non-matching chips. A card with mixed tabs appears in both
               — matched chips above, non-matched chips here. Hidden when
               filter is empty or every tab happens to match. -->
          <div class="missions-other" id="openTabsMissionsOther" style="display: none">
            <div class="missions-divider" role="separator">
              <span class="missions-divider-rule"></span>
              <span class="missions-divider-label">Other tabs</span>
              <span class="missions-divider-rule"></span>
            </div>
            <div class="missions" id="openTabsMissionsUnmatched"></div>
          </div>
        </div>
      </div>
    </div>
    <!-- end .scroll-region -->

    <!-- ================================================================
     URL PREVIEW — mimics Chrome's bottom-left link status bar. Shown
     while the cursor hovers any element whose click focuses a tab
     (chip body, env pill). Wired via delegation in app.js. Hidden by
     default via CSS (opacity:0).
     ================================================================ -->
    <div class="url-preview" id="urlPreview" aria-hidden="true">
      <span id="urlPreviewText"></span>
    </div>

    <!-- ================================================================
     TOAST — floats above everything, used for action confirmations.
     Preact-owned: <Toast> in components/Toast.js emits the .toast
     element on demand. This wrapper is just a static mount point.
     ================================================================ -->
    <div id="toastRoot"></div>

    <!-- Personal config (gitignored) — defines LOCAL_LANDING_PAGE_PATTERNS etc.
     If the file doesn't exist, Chrome logs a harmless 404; app.js checks
     for `typeof LOCAL_LANDING_PAGE_PATTERNS !== 'undefined'` and falls back
     to sensible defaults. We can't silence the 404 with onerror="..." because
     Manifest V3's CSP forbids inline event handlers. -->
    <script src="config.local.js"></script>

    <!-- Main dashboard logic — loaded as an ES module so it can split across
     multiple files (suspender.js, groups.js, tabs.js, render.js,
     components/*, etc.). `type="module"` defers execution until
     DOMContentLoaded automatically. -->
    <script type="module" src="app.js"></script>
  </body>
</html>
