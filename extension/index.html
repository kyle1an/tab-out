<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Transparent favicon — placed immediately after charset so the
       HTML parser hits it as early as possible, minimizing the window
       where Chrome's default extension icon briefly flashes on load.
       Two forms (`icon` + `shortcut icon`) cover Chrome's fallback
       chain in both modern and legacy paths. -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg'/%3E" />
    <link rel="shortcut icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg'/%3E" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>‎</title>

    <!-- Typography: everything uses the user's Chrome "Sans-serif" setting
       (chrome://settings/fonts). No web fonts are loaded. -->

    <!-- base.css must load first: defines CSS variables and layout skeleton
       that every rule in style.css relies on. Parallel-downloaded thanks
       to two separate <link>s (no @import serial round-trip). -->
    <link rel="stylesheet" href="base.css" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="appRoot"></div>

    <!-- ================================================================
     TOAST — floats above everything, used for action confirmations.
     Preact-owned: <Toast> in components/Toast.js emits the .toast
     element on demand. This wrapper is just a static mount point.
     ================================================================ -->
    <div id="toastRoot"></div>

    <!-- Personal config (gitignored) — defines LOCAL_LANDING_PAGE_PATTERNS etc.
     If the file doesn't exist, Chrome logs a harmless 404; app.js checks
     for `typeof LOCAL_LANDING_PAGE_PATTERNS !== 'undefined'` and falls back
     to sensible defaults. We can't silence the 404 with onerror="..." because
     Manifest V3's CSP forbids inline event handlers. -->
    <script src="config.local.js"></script>

    <!-- Main dashboard logic — loaded as an ES module so it can split across
     multiple files (suspender.js, groups.js, tabs.js, render.js,
     components/*, etc.). `type="module"` defers execution until
     DOMContentLoaded automatically. -->
    <script type="module" src="app.js"></script>
  </body>
</html>
