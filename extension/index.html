<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tab Out</title>

  <!-- Typography: everything uses the user's Chrome "Sans-serif" setting
       (chrome://settings/fonts). No web fonts are loaded. -->

  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">



  <!-- ================================================================
       HEADER — greeting on the left
       ================================================================ -->
  <header>
    <div class="header-left">
      <!-- "182 Open tabs" — written by updateTabCountDisplays() in app.js -->
      <h1 id="greeting"></h1>
      <!-- "Across 3 windows" — also written by updateTabCountDisplays(). -->
      <div class="date" id="dateDisplay"></div>
    </div>
    <!-- Live filter — debounced; matches title text + URL substring;
         hides non-matching chips and any card left empty. -->
    <input
      type="search"
      id="tabFilter"
      class="tab-filter"
      placeholder="Filter tabs…"
      autocomplete="off"
      spellcheck="false">
  </header>

  <!-- ================================================================
       OPEN TABS — domain/mission cards
       ================================================================ -->
  <div class="active-section" id="openTabsSection" style="display:none">
    <div class="section-header">
      <div class="section-line"></div>
      <div class="section-count" id="openTabsSectionCount"></div>
    </div>
    <div class="missions" id="openTabsMissions"></div>
  </div>

</div><!-- end .container -->

<!-- ================================================================
     TOAST — floats above everything, used for action confirmations
     Hidden by default via CSS (opacity:0, translateY)
     ================================================================ -->
<div class="toast" id="toast">
  <!-- Checkmark circle icon (Heroicons outline) -->
  <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
    <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75 11.25 15 15 9.75M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />
  </svg>
  <span id="toastText"></span>
</div>

<!-- Personal config (gitignored) — defines LOCAL_LANDING_PAGE_PATTERNS etc.
     If the file doesn't exist, Chrome logs a harmless 404; app.js checks
     for `typeof LOCAL_LANDING_PAGE_PATTERNS !== 'undefined'` and falls back
     to sensible defaults. We can't silence the 404 with onerror="..." because
     Manifest V3's CSP forbids inline event handlers. -->
<script src="config.local.js"></script>

<!-- Main dashboard logic — loaded as an ES module so it can split across
     multiple files (suspender.js, groups.js, tabs.js, render.js, etc.).
     `type="module"` defers execution until DOMContentLoaded automatically. -->
<script type="module" src="app.js"></script>
</body>
</html>
